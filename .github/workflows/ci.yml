name: CI

# OpenSolvency governance plane — CI. The TypeScript core runs on Node 24 (the
# engines floor is >=22.18, and the full suite touches node:sqlite). Each language
# client is additionally compile/test-gated on its own toolchain (Go / Rust / C /
# Python), so every published client is proven to build on every push.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: typecheck · full suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Node 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      # Clean, lockfile-exact install — fails if package-lock.json is stale.
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      # Emit the publishable dist (tsc → dist, .ts specifiers rewritten to .js).
      # Verifies the package actually compiles for distribution.
      - name: Build
        run: npm run build

      # The full suite — gate, audit, executor, store (node:sqlite), rails,
      # finance, agents, ingress, identity, reputation, earning, MCP.
      - name: Test
        run: npm test

  demo:
    name: end-to-end demo (smoke test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Node 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # In-memory walkthrough — no key, no network, no sqlite. A fast smoke test
      # that the gate, executor, and rails wire together end to end.
      - name: Demo
        run: npm run demo

  eval-gate:
    name: eval gate (gate decisions + process checks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Node 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Deterministic: runs every generated scenario live and fails on any wrong
      # gate outcome or block-severity process violation. No model, no network.
      - name: Eval gate
        run: npm run eval-gate

  docs:
    name: docs (mdbook build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install mdBook
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz | tar -xz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Build docs
        run: mdbook build docs

  # ── language clients — each compile/test-gated on its own toolchain ──────────
  client-go:
    name: client (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: Build · vet · fmt
        working-directory: clients/go
        run: |
          go build ./...
          go vet ./...
          test -z "$(gofmt -l .)" || { echo "gofmt needs to run"; gofmt -l .; exit 1; }

  client-rust:
    name: client (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build · test · fmt · clippy
        working-directory: clients/rust
        run: |
          cargo build --quiet
          cargo test --quiet
          cargo fmt --check
          cargo clippy --quiet -- -D warnings

  client-c:
    name: client (C/C++)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install libcurl
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev
      - name: Syntax-check + compile + link
        working-directory: clients/c
        run: |
          make check
          make

  client-python:
    name: client (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Compile + import (stdlib only)
        working-directory: clients/python
        run: |
          python -m py_compile opensolvency.py
          python -c "import opensolvency; print('import ok:', opensolvency.OpenSolvencyClient)"
