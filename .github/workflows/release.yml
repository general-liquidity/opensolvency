name: Release

# Tokenless publishing via OIDC "Trusted Publishing". There are NO secrets to
# store or rotate: each registry trusts THIS workflow directly, and GitHub mints a
# short-lived identity per run. You configure the trusted publisher once on each
# registry's website (see RELEASING.md), then publishing is just a tag.
#
# SAFE BY DEFAULT: each job is gated on a repository VARIABLE, so with nothing
# configured this workflow publishes NOTHING. Opt a registry in by setting the var:
#   PUBLISH_NPM=true · PUBLISH_PYPI=true · PUBLISH_CRATES=true
# Then push a tag (e.g. `v0.1.1`) or run the workflow manually.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # the OIDC identity used for trusted publishing (all three registries)

jobs:
  npm:
    name: npm (agentworth + agentworth-mcp)
    if: ${{ vars.PUBLISH_NPM == 'true' }}
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
      # npm trusted publishing (OIDC) needs npm >= 11.5; provenance is automatic.
      - run: npm install -g npm@latest
      - run: npm ci
      - name: Publish @general-liquidity/agentworth (skip if version exists)
        run: |
          V=$(node -p "require('./package.json').version")
          if npm view "@general-liquidity/agentworth@$V" version >/dev/null 2>&1; then
            echo "@general-liquidity/agentworth@$V already published — skipping"
          else
            npm publish --access public
          fi
      - name: Publish @general-liquidity/agentworth-mcp (skip if version exists)
        working-directory: agentworth-mcp
        run: |
          V=$(node -p "require('./package.json').version")
          if npm view "@general-liquidity/agentworth-mcp@$V" version >/dev/null 2>&1; then
            echo "@general-liquidity/agentworth-mcp@$V already published — skipping"
          else
            npm publish --access public
          fi

  pypi:
    name: PyPI (agentworth)
    if: ${{ vars.PUBLISH_PYPI == 'true' }}
    runs-on: ubuntu-latest
    # A dedicated publishing environment (configure protection rules under
    # Settings → Environments → pypi). Must match the PyPI trusted-publisher config.
    environment: pypi
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Build sdist + wheel
        working-directory: clients/python
        run: |
          python -m pip install --upgrade build
          python -m build
      # No password: the action authenticates to PyPI via OIDC (trusted publisher).
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: clients/python/dist
          # Re-runs of an already-published version are skipped (green), not failed,
          # so the pipeline is idempotent across registries at different versions.
          skip-existing: true

  crates:
    name: crates.io (agentworth)
    if: ${{ vars.PUBLISH_CRATES == 'true' }}
    runs-on: ubuntu-latest
    environment: crates
    steps:
      - uses: actions/checkout@v6
      # Exchanges the GitHub OIDC identity for a short-lived crates.io token.
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: Build + test before publishing
        working-directory: clients/rust
        run: cargo test --quiet
      - name: Publish to crates.io (skip if version exists)
        working-directory: clients/rust
        run: |
          V=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          CODE=$(curl -s -o /dev/null -w "%{http_code}" -A "agentworth-ci" "https://crates.io/api/v1/crates/agentworth/$V")
          if [ "$CODE" = "200" ]; then
            echo "agentworth $V already on crates.io — skipping"
          else
            cargo publish
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
