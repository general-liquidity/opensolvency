# Local / single-node deployment of the AgentWorth ingress.
#   AGENTWORTH_INGRESS_TOKEN=$(openssl rand -hex 24) docker compose up --build
# The sqlite store persists on the `osdata` volume. For multi-instance / Postgres,
# compose your own deployment using the SDK's createPostgresStore (the CLI is
# single-node sqlite by design).

services:
  agentworth:
    build: .
    ports:
      - "8787:8787"
    environment:
      # REQUIRED to bind a public interface — the service fails closed without it.
      AGENTWORTH_INGRESS_TOKEN: ${AGENTWORTH_INGRESS_TOKEN:?set a bearer token}
      AGENTWORTH_DB: /data/agentworth.db
      # Optional: a model key enables the real agent (otherwise the deterministic stub).
      AGENTWORTH_MODEL_API_KEY: ${AGENTWORTH_MODEL_API_KEY:-}
      AGENTWORTH_MODEL_PROVIDER: ${AGENTWORTH_MODEL_PROVIDER:-openai}
    volumes:
      - osdata:/data
    restart: unless-stopped

volumes:
  osdata:
